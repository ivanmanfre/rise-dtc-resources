<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RISE DTC · Content Desk</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#ffc71d">
<style>
  html, body { margin: 0; height: 100%; background: #fff; font-family: 'Manrope', system-ui, -apple-system, sans-serif; }
  /* Gated board embed. The framed app shows its own email + 6-digit-code sign-in
     screen when there is no session; the code is redeemed IN the frame, so login
     completes here on resources.risedtc.com without leaving the page. */
  #frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
  #splash {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .75rem; background: #fff;
    transition: opacity .4s ease; z-index: 2;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash .mark { font-weight: 800; letter-spacing: .08em; font-size: .95rem; color: #0e1512; }
  #splash .sub { font-size: .8rem; color: #8a8a80; letter-spacing: .04em; }
  #splash .dot { width: 8px; height: 8px; border-radius: 50%; background: #ffc71d; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.85); } 50% { opacity: 1; transform: scale(1.1); } }
</style>
</head>
<body>
  <div id="splash">
    <div class="dot"></div>
    <div class="mark">RISE DTC</div>
    <div class="sub">Loading your content desk…</div>
  </div>
  <iframe id="frame" title="RISE DTC Content Desk"
    src="https://ivanmanfredi.com/client/risedtc-com"
    allow="clipboard-write"></iframe>
  <script>
    var f = document.getElementById('frame'), s = document.getElementById('splash');
    f.addEventListener('load', function () { s.classList.add('hide'); });
    setTimeout(function () { s.classList.add('hide'); }, 6000);
  </script>
</body>
</html>
